<!doctype html>
<html><head><title>Long form</title></head>
<body>
<h1>Profile</h1>
<form>
  <label>First name <input id="first" name="first"></label>
  <label>Last name <input id="last" name="last"></label>
  <label>Bio <textarea id="bio" name="bio" rows="4" cols="60"></textarea></label>
  <label>City <input id="city" name="city"></label>
  <label>Country <input id="country" name="country"></label>
  <button id="save" type="button">Save</button>
</form>
</body></html>
